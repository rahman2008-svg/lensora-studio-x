# Project-wide Gradle settings

# JVM memory (safe for CI + mobile build machines)
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Enable parallel build (faster builds)
org.gradle.parallel=true

# Kotlin style
kotlin.code.style=official

# Better R class optimization
android.nonTransitiveRClass=true

# Gradle caching (CI friendly)
org.gradle.caching=true

# ⚠️ REMOVE configuration cache (Codemagic often breaks with it)
# org.gradle.configuration-cache=true

# Limit workers (avoid OOM in CI)
org.gradle.workers.max=4

# Fix Kotlin daemon issues in CI
kotlin.compiler.execution.strategy=in-process

# Enable AndroidX
android.useAndroidX=true

# Jetifier only if legacy libs exist (safe to keep false if fully modern)
android.enableJetifier=false

# Reduce CI memory spikes
org.gradle.daemon=false
