# Codemagic CI Build Pipeline Configuration
# Dedicated for automated Android Release/Debug Packaging

workflows:
  lensora-build-pipeline:
    name: Lensora Studio X Compilation
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.aistudio.lensorastudio.xkydq"
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'master'
          include: true
    scripts:
      - name: Initialize environment details
        script: | 
          echo "Building Lensora Studio X Client Offline Tool Suite"
          java -version
      - name: Build Debug Android Package (APK)
        script: |
          gradle assembleDebug
      - name: Build Release Bundle (AAB)
        script: |
          gradle bundleRelease
    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/bundle/**/*.aab
    publishing:
      email:
        recipients:
          - princearabdurrahman57@gmail.com
        notify:
          success: true
          failure: true
