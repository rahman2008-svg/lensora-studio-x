workflows:
  lensora-build-pipeline:
    name: Lensora Studio X Compilation
    max_build_duration: 60

    instance_type: mac_mini_m1

    environment:
      java: 17
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "com.aistudio.lensorastudio.xkydq"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true

    scripts:
      - name: Checkout
        script: |
          echo "Starting Lensora Studio X CI Build..."

      - name: Grant permissions
        script: |
          chmod +x gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease --stacktrace

    artifacts:
      - app/build/outputs/apk/**/*.apk
      - app/build/outputs/bundle/**/*.aab

    publishing:
      email:
        recipients:
          - princearabdurrahman57@gmail.com
        notify:
          success: true
          failure: true
